# Publications data, rendered by _includes/publication.html via a loop in research.md.
#
# Per-entry schema:
#   title:       (required) paper title
#   url:         link target; omit or leave "" for no link
#   authors:     (required) ordered list of author names.
#                Any author exactly equal to "Surbhi Goel" is auto-highlighted.
#   alpha_beta:  true to prepend the "(α-β)" alphabetical-ordering note
#   venue:       published venue, e.g. "COLT 2026" (italic line; optional)
#   highlights:  optional list of recognitions, each an italic line:
#                  - badge:   text shown in the orange highlight style (optional)
#                    context: trailing plain text, e.g. ", NeurIPS 2025 Workshop"
#
# Sections (preprints / conference / reports) map to the headings in research.md.
# To migrate the remaining sections, add entries under `conference` and `reports`
# following the same schema, then replace those sections in research.md with the
# same loop used for preprints.

